name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: macos-26
    timeout-minutes: 45
    env:
      HAS_SONAR_TOKEN: ${{ secrets.SONAR_TOKEN != '' || secrets.SONAR_TOKEN_PERSONAL != '' }}
    steps:
      - name: Checkout container-k8s
        uses: actions/checkout@v7
        with:
          path: container-k8s
          fetch-depth: 0

      - name: Compute SwiftPM cache fingerprint
        id: swiftpm-cache
        shell: bash
        run: |
          set -euo pipefail
          {
            swift --version 2>&1
            shasum -a 256 container-k8s/Package.swift
            if [[ -f container-k8s/Package.resolved ]]; then
              shasum -a 256 container-k8s/Package.resolved
            fi
            shasum -a 256 container-k8s/Makefile
          } | shasum -a 256 | awk '{ printf "fingerprint=%s\n", $1 }' >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v6
        with:
          path: |
            container-k8s/.build
            container-k8s/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-swiftpm-v1-${{ steps.swiftpm-cache.outputs.fingerprint }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos26-swiftpm-v1-

      - name: Install Markdown lint
        run: npm install --global --ignore-scripts markdownlint-cli@0.48.0

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version
          markdownlint --version

      - name: Run local CI workflow
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        timeout-minutes: 25
        run: make ci
        working-directory: container-k8s

      - name: Upload coverage reports
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: container-k8s-coverage
          path: |
            container-k8s/coverage.lcov
            container-k8s/coverage.xml

      - name: Install Sonar Scanner CLI
        if: >
          env.HAS_SONAR_TOKEN == 'true' &&
          (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') &&
          (github.event_name != 'pull_request' ||
            (github.event.pull_request.head.repo.full_name == github.repository &&
             github.actor != 'dependabot[bot]'))
        env:
          SONAR_SCANNER_VERSION: 8.1.0.6389
        run: |
          case "$(uname -m)" in
            arm64)
              scanner_flavor="macosx-aarch64"
              scanner_sha256="20d12be4081896b337cd873d98ebd3d554be666086a45e31dd84a12ef51c3688"
              ;;
            x86_64)
              scanner_flavor="macosx-x64"
              scanner_sha256="8afc8bbff9008434e53b31cb681333ff643b999f84ca537db573d0fae8883cdc"
              ;;
            *)
              printf 'Unsupported macOS architecture: %s\n' "$(uname -m)" >&2
              exit 1
              ;;
          esac

          scanner_name="sonar-scanner-cli-${SONAR_SCANNER_VERSION}-${scanner_flavor}"
          scanner_url="https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/${scanner_name}.zip"
          scanner_root="${RUNNER_TEMP}/sonar-scanner-cli"
          rm -rf "$scanner_root"
          mkdir -p "$scanner_root"
          scanner_archive="${RUNNER_TEMP}/${scanner_name}.zip"
          curl --fail --location --proto '=https' --proto-redir '=https' \
            --silent --show-error "$scanner_url" --output "$scanner_archive"
          printf '%s  %s\n' "$scanner_sha256" "$scanner_archive" | shasum -a 256 --check
          unzip -q "$scanner_archive" -d "$scanner_root"
          printf '%s\n' "${scanner_root}/sonar-scanner-${SONAR_SCANNER_VERSION}-${scanner_flavor}/bin" >> "$GITHUB_PATH"

      - name: SonarCloud scan
        if: >
          env.HAS_SONAR_TOKEN == 'true' &&
          (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') &&
          (github.event_name != 'pull_request' ||
            (github.event.pull_request.head.repo.full_name == github.repository &&
             github.actor != 'dependabot[bot]'))
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || secrets.SONAR_TOKEN_PERSONAL }}
        run: make sonar-scan
        working-directory: container-k8s

      - name: Skip SonarCloud scan
        if: >
          env.HAS_SONAR_TOKEN != 'true' &&
          (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
        run: printf 'SonarCloud scan skipped because SONAR_TOKEN is not configured yet.\n'

      - name: Build plugin package
        if: github.ref == 'refs/heads/main'
        timeout-minutes: 15
        run: make package-debug PLUGIN_ARCHIVE=container-k8s-plugin.tar.gz
        working-directory: container-k8s

      - name: Upload plugin artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: container-k8s-plugin
          path: container-k8s/container-k8s-plugin.tar.gz
