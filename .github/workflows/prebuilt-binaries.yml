name: Prebuilt Binaries

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: "main or MAJOR.MINOR.PATCH tag to package"
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: prebuilt-binaries-${{ github.event.workflow_run.head_branch || inputs.ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'main' }}

jobs:
  resolve-publish-context:
    name: Resolve Publish Context
    if: >
      github.repository == 'stephenlclarke/container-k8s' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.publish.outputs.publish }}
      ref_type: ${{ steps.publish.outputs.ref_type }}
      ref_name: ${{ steps.publish.outputs.ref_name }}
      checkout_ref: ${{ steps.publish.outputs.checkout_ref }}
      sha: ${{ steps.publish.outputs.sha }}
    steps:
      - name: Resolve publish context
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_REF: ${{ inputs.ref }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          set -euo pipefail

          publish=false
          ref_type=""
          ref_name=""
          checkout_ref=""
          sha=""
          remote="https://github.com/${GITHUB_REPOSITORY}.git"

          resolve_remote_ref() {
            local ref="$1"
            if [[ "$ref" == "main" ]]; then
              local branch_sha
              branch_sha="$(
                git ls-remote --heads "$remote" "refs/heads/${ref}" \
                  | awk '{print $1}' \
                  | tail -n 1
              )"
              if [[ -z "$branch_sha" ]]; then
                printf 'main branch not found: %s\n' "$ref" >&2
                exit 1
              fi
              ref_type="branch"
              ref_name="$ref"
              checkout_ref="$branch_sha"
              sha="$branch_sha"
              publish=true
              return
            fi

            if [[ "$ref" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
              local tag_sha
              tag_sha="$(
                git ls-remote --tags "$remote" "refs/tags/${ref}" "refs/tags/${ref}^{}" \
                  | awk '{print $1}' \
                  | tail -n 1
              )"
              if [[ -z "$tag_sha" ]]; then
                printf 'stable tag not found: %s\n' "$ref" >&2
                exit 1
              fi
              ref_type="tag"
              ref_name="$ref"
              checkout_ref="$tag_sha"
              sha="$tag_sha"
              publish=true
              return
            fi

            printf 'unsupported package ref: %s\n' "$ref" >&2
            exit 1
          }

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            if [[ "${WORKFLOW_RUN_EVENT}" != "push" ]]; then
              printf 'Skipping non-push CI event: %s\n' "${WORKFLOW_RUN_EVENT}"
            else
              validate_conclusion="$(
                gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs/${WORKFLOW_RUN_ID}/jobs" \
                  --jq '.jobs[] | select(.name == "Validate") | .conclusion' \
                  | tail -n 1
              )"
              if [[ "${validate_conclusion}" != "success" ]]; then
                printf 'Skipping package publish because CI Validate concluded %s.\n' "${validate_conclusion:-missing}"
              elif [[ "${WORKFLOW_RUN_HEAD_BRANCH}" == "main" ]]; then
                ref_type="branch"
                ref_name="${WORKFLOW_RUN_HEAD_BRANCH}"
                checkout_ref="${WORKFLOW_RUN_HEAD_SHA}"
                sha="${WORKFLOW_RUN_HEAD_SHA}"
                publish=true
              elif [[ "${WORKFLOW_RUN_HEAD_BRANCH}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
                printf 'Skipping CI tag package event: %s. Stable packages are created only by workflow_dispatch.\n' "${WORKFLOW_RUN_HEAD_BRANCH}"
              else
                printf 'Skipping non-package CI ref: %s\n' "${WORKFLOW_RUN_HEAD_BRANCH}"
              fi
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -z "${DISPATCH_REF}" ]]; then
              printf 'Manual package dispatch requires ref=main or ref=MAJOR.MINOR.PATCH.\n' >&2
              exit 1
            fi
            resolve_remote_ref "${DISPATCH_REF}"
          else
            printf 'Unsupported package event: %s\n' "${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi

          {
            printf 'publish=%s\n' "${publish}"
            printf 'ref_type=%s\n' "${ref_type}"
            printf 'ref_name=%s\n' "${ref_name}"
            printf 'checkout_ref=%s\n' "${checkout_ref}"
            printf 'sha=%s\n' "${sha}"
          } >> "$GITHUB_OUTPUT"

  package:
    name: Package
    needs: resolve-publish-context
    if: needs.resolve-publish-context.outputs.publish == 'true'
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout container-k8s
        uses: actions/checkout@v7
        with:
          path: container-k8s
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.checkout_ref }}
          token: ${{ github.token }}

      - name: Select release package
        id: package
        shell: bash
        working-directory: container-k8s
        env:
          PUBLISH_REF_TYPE: ${{ needs.resolve-publish-context.outputs.ref_type }}
          PUBLISH_REF_NAME: ${{ needs.resolve-publish-context.outputs.ref_name }}
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
        run: |
          set -euo pipefail
          version="$(sed -n 's/^K8S_VERSION ?= //p' Makefile | head -n 1)"
          short_sha="${PUBLISH_SHA:0:12}"
          case "${PUBLISH_REF_TYPE}:${PUBLISH_REF_NAME}" in
            branch:main)
              release_tag="homebrew-main-${GITHUB_RUN_NUMBER}-${short_sha}"
              release_title="${version} main ${short_sha}"
              release_label="Main validation"
              release_latest="false"
              release_prerelease="true"
              update_tap="false"
              asset="container-k8s-plugin-homebrew-main-release-arm64.tar.gz"
              formula_version="${version}+main.${GITHUB_RUN_NUMBER}.${short_sha}"
              package_lane="main"
              ;;
            tag:*)
              if [[ ! "${PUBLISH_REF_NAME}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
                printf 'Stable release tags must be bare semver: %s\n' "${PUBLISH_REF_NAME}" >&2
                exit 1
              fi
              if [[ "${version}" != "${PUBLISH_REF_NAME}" ]]; then
                printf 'K8S_VERSION %s does not match stable tag %s\n' "${version}" "${PUBLISH_REF_NAME}" >&2
                exit 1
              fi
              release_tag="${PUBLISH_REF_NAME}"
              release_title="${version}"
              release_label="stable release"
              release_latest="true"
              release_prerelease="false"
              update_tap="true"
              asset="container-k8s-plugin-release-arm64.tar.gz"
              formula_version="${version}"
              package_lane="stable"
              ;;
            *)
              printf 'Unsupported release ref: %s %s\n' "${PUBLISH_REF_TYPE}" "${PUBLISH_REF_NAME}" >&2
              exit 1
              ;;
          esac

          {
            printf 'version=%s\n' "${version}"
            printf 'release_tag=%s\n' "${release_tag}"
            printf 'release_title=%s\n' "${release_title}"
            printf 'release_label=%s\n' "${release_label}"
            printf 'release_latest=%s\n' "${release_latest}"
            printf 'release_prerelease=%s\n' "${release_prerelease}"
            printf 'update_tap=%s\n' "${update_tap}"
            printf 'asset=%s\n' "${asset}"
            printf 'formula_version=%s\n' "${formula_version}"
            printf 'package_lane=%s\n' "${package_lane}"
          } >> "$GITHUB_OUTPUT"

      - name: Build package
        run: make package-release PLUGIN_ARCHIVE="${RUNNER_TEMP}/${{ steps.package.outputs.asset }}"
        working-directory: container-k8s
        env:
          CONTAINER_K8S_BRANCH: ${{ needs.resolve-publish-context.outputs.ref_name }}
          CONTAINER_K8S_COMMIT: ${{ needs.resolve-publish-context.outputs.sha }}
          CONTAINER_K8S_LANE: ${{ steps.package.outputs.package_lane }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.asset }}
          path: |
            ${{ runner.temp }}/${{ steps.package.outputs.asset }}
            ${{ runner.temp }}/${{ steps.package.outputs.asset }}.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: ${{ steps.package.outputs.asset }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.package.outputs.release_title }}
          RELEASE_LABEL: ${{ steps.package.outputs.release_label }}
          RELEASE_LATEST: ${{ steps.package.outputs.release_latest }}
          RELEASE_PRERELEASE: ${{ steps.package.outputs.release_prerelease }}
          PUBLISH_REF_TYPE: ${{ needs.resolve-publish-context.outputs.ref_type }}
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
        shell: bash
        working-directory: container-k8s
        run: |
          set -euo pipefail
          sha256="$(awk '{print $1}' "${RUNNER_TEMP}/${ASSET}.sha256")"
          notes="$(mktemp)"
          {
            printf '## Summary\n\n'
            printf -- '- %s package for container-k8s.\n' "${RELEASE_LABEL}"
            printf -- "- Commit: \`%s\`.\n" "${PUBLISH_SHA}"
            printf -- "- Asset SHA-256: \`%s\`.\n" "${sha256}"
          } > "$notes"

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            create_args=(
              gh release create "${RELEASE_TAG}"
              --title "${RELEASE_TITLE}"
              --notes-file "${notes}"
            )
            if [[ "${PUBLISH_REF_TYPE}" == "tag" ]]; then
              create_args+=(--verify-tag)
            else
              create_args+=(--target "${PUBLISH_SHA}")
            fi
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            if [[ "${RELEASE_LATEST}" == "true" ]]; then
              create_args+=(--latest)
            else
              create_args+=(--latest=false)
            fi
            "${create_args[@]}"
          else
            edit_args=(
              gh release edit "${RELEASE_TAG}"
              --title "${RELEASE_TITLE}"
              --notes-file "${notes}"
            )
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              edit_args+=(--prerelease)
            fi
            if [[ "${RELEASE_LATEST}" == "true" ]]; then
              edit_args+=(--latest)
            else
              edit_args+=(--latest=false)
            fi
            "${edit_args[@]}"
          fi

          gh release upload "${RELEASE_TAG}" \
            "${RUNNER_TEMP}/${ASSET}" \
            "${RUNNER_TEMP}/${ASSET}.sha256" \
            --clobber

      - name: Check Homebrew tap token
        if: steps.package.outputs.update_tap == 'true'
        id: tap-token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            printf 'available=false\n' >> "$GITHUB_OUTPUT"
            printf 'HOMEBREW_TAP_TOKEN is not set; skipping stephenlclarke/homebrew-tap update.\n'
            exit 0
          fi
          printf 'available=true\n' >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        if: steps.package.outputs.update_tap == 'true' && steps.tap-token.outputs.available == 'true'
        uses: actions/checkout@v7
        with:
          repository: stephenlclarke/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew tap formula
        if: steps.package.outputs.update_tap == 'true' && steps.tap-token.outputs.available == 'true'
        env:
          ASSET: ${{ steps.package.outputs.asset }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          VERSION: ${{ steps.package.outputs.formula_version }}
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/stephenlclarke/container-k8s/releases/download/${RELEASE_TAG}/${ASSET}"
          sha256="$(awk '{print $1}' "${RUNNER_TEMP}/${ASSET}.sha256")"
          python3 container-k8s/Tools/release/update-homebrew-formula.py \
            --formula "container-k8s.rb" \
            --url "$url" \
            --version "$VERSION" \
            --asset "$ASSET" \
            --label "stable release" \
            --sha256 "$sha256"
          ruby -c homebrew-tap/Formula/container-k8s.rb
          git -C homebrew-tap diff -- Formula/container-k8s.rb

      - name: Commit Homebrew tap update
        if: steps.package.outputs.update_tap == 'true' && steps.tap-token.outputs.available == 'true'
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/container-k8s.rb; then
            printf 'Homebrew tap formula already points at %s\n' "${{ steps.package.outputs.asset }}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/container-k8s.rb
          git commit -m "chore(homebrew): update container-k8s ${{ steps.package.outputs.formula_version }}"
          git push
