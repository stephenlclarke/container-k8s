name: Prebuilt Binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: prebuilt-binaries-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  resolve-publish-context:
    name: Resolve Publish Context
    if: >
      github.repository == 'stephenlclarke/container-k8s' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      ref_type: ${{ steps.publish.outputs.ref_type }}
      ref_name: ${{ steps.publish.outputs.ref_name }}
      sha: ${{ steps.publish.outputs.sha }}
    steps:
      - name: Resolve publish context
        id: publish
        env:
          EVENT_REF_NAME: ${{ github.ref_name }}
          EVENT_REF_TYPE: ${{ github.ref_type }}
          EVENT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          case "${EVENT_REF_TYPE}:${EVENT_REF_NAME}" in
            branch:main)
              ;;
            tag:*)
              if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]] ||
                [[ ! "${EVENT_REF_NAME}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
                printf 'Stable packages require workflow_dispatch on a bare semantic tag: %s\n' "${EVENT_REF_NAME}" >&2
                exit 1
              fi
              ;;
            *)
              printf 'Unsupported package ref: %s %s\n' "${EVENT_REF_TYPE}" "${EVENT_REF_NAME}" >&2
              exit 1
              ;;
          esac

          if [[ ! "${EVENT_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            printf 'Package SHA is not a full commit ID: %s\n' "${EVENT_SHA}" >&2
            exit 1
          fi

          {
            printf 'ref_type=%s\n' "${EVENT_REF_TYPE}"
            printf 'ref_name=%s\n' "${EVENT_REF_NAME}"
            printf 'sha=%s\n' "${EVENT_SHA}"
          } >> "$GITHUB_OUTPUT"

  package:
    name: Package
    needs: resolve-publish-context
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout container-k8s
        uses: actions/checkout@v7
        with:
          path: container-k8s
          fetch-depth: 0
          persist-credentials: false

      - name: Verify package checkout
        env:
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C container-k8s rev-parse HEAD)"
          if [[ "${actual}" != "${PUBLISH_SHA}" ]]; then
            printf 'Package checkout mismatch: expected %s, got %s\n' "${PUBLISH_SHA}" "${actual}" >&2
            exit 1
          fi
          git -C container-k8s fetch --force origin \
            refs/heads/main:refs/remotes/origin/main
          if ! git -C container-k8s merge-base --is-ancestor "${PUBLISH_SHA}" refs/remotes/origin/main; then
            printf 'Package commit is not reachable from origin/main: %s\n' "${PUBLISH_SHA}" >&2
            exit 1
          fi

      - name: Select release package
        id: package
        shell: bash
        working-directory: container-k8s
        env:
          PUBLISH_REF_TYPE: ${{ needs.resolve-publish-context.outputs.ref_type }}
          PUBLISH_REF_NAME: ${{ needs.resolve-publish-context.outputs.ref_name }}
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
        run: |
          set -euo pipefail
          version="$(sed -n 's/^K8S_VERSION ?= //p' Makefile | head -n 1)"
          short_sha="${PUBLISH_SHA:0:12}"
          case "${PUBLISH_REF_TYPE}:${PUBLISH_REF_NAME}" in
            branch:main)
              release_tag="homebrew-main-${GITHUB_RUN_NUMBER}-${short_sha}"
              release_title="${version} main ${short_sha}"
              release_label="Main validation"
              release_latest="false"
              release_prerelease="true"
              update_tap="false"
              asset="container-k8s-plugin-homebrew-main-release-arm64.tar.gz"
              formula_version="${version}+main.${GITHUB_RUN_NUMBER}.${short_sha}"
              package_lane="main"
              ;;
            tag:*)
              if [[ ! "${PUBLISH_REF_NAME}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
                printf 'Stable release tags must be bare semver: %s\n' "${PUBLISH_REF_NAME}" >&2
                exit 1
              fi
              if [[ "${version}" != "${PUBLISH_REF_NAME}" ]]; then
                printf 'K8S_VERSION %s does not match stable tag %s\n' "${version}" "${PUBLISH_REF_NAME}" >&2
                exit 1
              fi
              release_tag="${PUBLISH_REF_NAME}"
              release_title="${version}"
              release_label="stable release"
              release_latest="true"
              release_prerelease="false"
              update_tap="true"
              asset="container-k8s-plugin-release-arm64.tar.gz"
              formula_version="${version}"
              package_lane="stable"
              ;;
            *)
              printf 'Unsupported release ref: %s %s\n' "${PUBLISH_REF_TYPE}" "${PUBLISH_REF_NAME}" >&2
              exit 1
              ;;
          esac

          {
            printf 'version=%s\n' "${version}"
            printf 'release_tag=%s\n' "${release_tag}"
            printf 'release_title=%s\n' "${release_title}"
            printf 'release_label=%s\n' "${release_label}"
            printf 'release_latest=%s\n' "${release_latest}"
            printf 'release_prerelease=%s\n' "${release_prerelease}"
            printf 'update_tap=%s\n' "${update_tap}"
            printf 'asset=%s\n' "${asset}"
            printf 'formula_version=%s\n' "${formula_version}"
            printf 'package_lane=%s\n' "${package_lane}"
          } >> "$GITHUB_OUTPUT"

      - name: Install Markdown lint
        run: npm install --global --ignore-scripts markdownlint-cli@0.48.0

      - name: Validate package source
        timeout-minutes: 25
        run: make ci
        working-directory: container-k8s

      - name: Build package
        run: make package-release PLUGIN_ARCHIVE="${RUNNER_TEMP}/${{ steps.package.outputs.asset }}"
        working-directory: container-k8s
        env:
          CONTAINER_K8S_BRANCH: ${{ needs.resolve-publish-context.outputs.ref_name }}
          CONTAINER_K8S_COMMIT: ${{ needs.resolve-publish-context.outputs.sha }}
          CONTAINER_K8S_LANE: ${{ steps.package.outputs.package_lane }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.asset }}
          path: |
            ${{ runner.temp }}/${{ steps.package.outputs.asset }}
            ${{ runner.temp }}/${{ steps.package.outputs.asset }}.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: ${{ steps.package.outputs.asset }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.package.outputs.release_title }}
          RELEASE_LABEL: ${{ steps.package.outputs.release_label }}
          RELEASE_LATEST: ${{ steps.package.outputs.release_latest }}
          RELEASE_PRERELEASE: ${{ steps.package.outputs.release_prerelease }}
          PUBLISH_REF_TYPE: ${{ needs.resolve-publish-context.outputs.ref_type }}
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
        shell: bash
        working-directory: container-k8s
        run: |
          set -euo pipefail
          sha256="$(awk '{print $1}' "${RUNNER_TEMP}/${ASSET}.sha256")"
          notes="$(mktemp)"
          {
            printf '## Summary\n\n'
            printf -- '- %s package for container-k8s.\n' "${RELEASE_LABEL}"
            printf -- "- Commit: \`%s\`.\n" "${PUBLISH_SHA}"
            printf -- "- Asset SHA-256: \`%s\`.\n" "${sha256}"
          } > "$notes"

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            create_args=(
              gh release create "${RELEASE_TAG}"
              --title "${RELEASE_TITLE}"
              --notes-file "${notes}"
            )
            if [[ "${PUBLISH_REF_TYPE}" == "tag" ]]; then
              create_args+=(--verify-tag)
            else
              create_args+=(--target "${PUBLISH_SHA}")
            fi
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            if [[ "${RELEASE_LATEST}" == "true" ]]; then
              create_args+=(--latest)
            else
              create_args+=(--latest=false)
            fi
            "${create_args[@]}"
          else
            edit_args=(
              gh release edit "${RELEASE_TAG}"
              --title "${RELEASE_TITLE}"
              --notes-file "${notes}"
            )
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              edit_args+=(--prerelease)
            fi
            if [[ "${RELEASE_LATEST}" == "true" ]]; then
              edit_args+=(--latest)
            else
              edit_args+=(--latest=false)
            fi
            "${edit_args[@]}"
          fi

          gh release upload "${RELEASE_TAG}" \
            "${RUNNER_TEMP}/${ASSET}" \
            "${RUNNER_TEMP}/${ASSET}.sha256" \
            --clobber

      - name: Check Homebrew tap token
        if: steps.package.outputs.update_tap == 'true'
        id: tap-token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            printf 'available=false\n' >> "$GITHUB_OUTPUT"
            printf 'HOMEBREW_TAP_TOKEN is not set; skipping stephenlclarke/homebrew-tap update.\n'
            exit 0
          fi
          printf 'available=true\n' >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        if: steps.package.outputs.update_tap == 'true' && steps.tap-token.outputs.available == 'true'
        uses: actions/checkout@v7
        with:
          repository: stephenlclarke/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew tap formula
        if: steps.package.outputs.update_tap == 'true' && steps.tap-token.outputs.available == 'true'
        env:
          ASSET: ${{ steps.package.outputs.asset }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          VERSION: ${{ steps.package.outputs.formula_version }}
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/stephenlclarke/container-k8s/releases/download/${RELEASE_TAG}/${ASSET}"
          sha256="$(awk '{print $1}' "${RUNNER_TEMP}/${ASSET}.sha256")"
          python3 container-k8s/Tools/release/update-homebrew-formula.py \
            --formula "container-k8s.rb" \
            --url "$url" \
            --version "$VERSION" \
            --asset "$ASSET" \
            --label "stable release" \
            --sha256 "$sha256"
          ruby -c homebrew-tap/Formula/container-k8s.rb
          git -C homebrew-tap diff -- Formula/container-k8s.rb

      - name: Commit Homebrew tap update
        if: steps.package.outputs.update_tap == 'true' && steps.tap-token.outputs.available == 'true'
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/container-k8s.rb; then
            printf 'Homebrew tap formula already points at %s\n' "${{ steps.package.outputs.asset }}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/container-k8s.rb
          git commit -m "chore(homebrew): update container-k8s ${{ steps.package.outputs.formula_version }}"
          git push
