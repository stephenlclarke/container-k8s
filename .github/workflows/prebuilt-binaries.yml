name: Prebuilt Binaries

on:
  push:
    branches:
      - "release/**"
      - "snapshot/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prebuilt-binaries-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  package:
    name: Package ${{ github.ref_name }}
    if: github.repository == 'stephenlclarke/container-k8s'
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout container-k8s
        uses: actions/checkout@v7
        with:
          path: container-k8s
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Prepare frozen branch README
        id: prepare
        shell: bash
        working-directory: container-k8s
        run: |
          set -euo pipefail
          Tools/release/prepare-frozen-branch.sh
          if git diff --quiet README.md; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(release): prepare frozen branch"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          printf 'changed=true\n' >> "$GITHUB_OUTPUT"

      - name: Select package lane
        if: steps.prepare.outputs.changed != 'true'
        id: lane
        shell: bash
        run: |
          set -euo pipefail
          slug="${GITHUB_REF_NAME//\//-}"
          case "${GITHUB_REF_NAME}" in
            release/*)
              target="package-release"
              asset="container-k8s-plugin-${slug}-release-arm64.tar.gz"
              release_name="Homebrew ${GITHUB_REF_NAME} release prebuilt"
              config="release"
              lane="release"
              formula="container-k8s.rb"
              label="${GITHUB_REF_NAME} release"
              ;;
            snapshot/*)
              target="package-debug"
              asset="container-k8s-plugin-${slug}-debug-arm64.tar.gz"
              release_name="Homebrew ${GITHUB_REF_NAME} debug prebuilt"
              config="debug"
              lane="snapshot"
              formula="container-k8s-snapshot.rb"
              label="${GITHUB_REF_NAME} debug"
              ;;
            *)
              printf 'Unsupported branch for prebuilt packaging: %s\n' "${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac
          {
            printf 'target=%s\n' "$target"
            printf 'asset=%s\n' "$asset"
            printf 'release_name=%s\n' "$release_name"
            printf 'config=%s\n' "$config"
            printf 'lane=%s\n' "$lane"
            printf 'formula=%s\n' "$formula"
            printf 'label=%s\n' "$label"
            printf 'slug=%s\n' "$slug"
            printf 'tag=homebrew-%s\n' "$slug"
            printf 'version=%s-%s\n' "$slug" "${GITHUB_SHA:0:12}"
          } >> "$GITHUB_OUTPUT"

      - name: Build package
        if: steps.prepare.outputs.changed != 'true'
        run: make "${{ steps.lane.outputs.target }}" PLUGIN_ARCHIVE="${RUNNER_TEMP}/${{ steps.lane.outputs.asset }}"
        working-directory: container-k8s
        env:
          CONTAINER_K8S_BRANCH: ${{ github.ref_name }}
          CONTAINER_K8S_COMMIT: ${{ github.sha }}
          CONTAINER_K8S_LANE: ${{ steps.lane.outputs.lane }}

      - name: Upload workflow artifact
        if: steps.prepare.outputs.changed != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.lane.outputs.asset }}
          path: |
            ${{ runner.temp }}/${{ steps.lane.outputs.asset }}
            ${{ runner.temp }}/${{ steps.lane.outputs.asset }}.sha256

      - name: Publish frozen branch release assets
        if: steps.prepare.outputs.changed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: ${{ steps.lane.outputs.asset }}
          RELEASE_NAME: ${{ steps.lane.outputs.release_name }}
          RELEASE_TAG: ${{ steps.lane.outputs.tag }}
        shell: bash
        working-directory: container-k8s
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          {
            printf '%s\n\n' "${RELEASE_NAME}"
            printf 'Branch: %s\n' "${GITHUB_REF_NAME}"
            printf 'Commit: %s\n' "${GITHUB_SHA}"
            printf 'Build configuration: %s\n' "${{ steps.lane.outputs.config }}"
          } > "$notes"

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "${RELEASE_NAME}" \
              --notes-file "$notes" \
              --prerelease
          else
            gh release edit "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "${RELEASE_NAME}" \
              --notes-file "$notes" \
              --prerelease
          fi

          gh release upload "$RELEASE_TAG" \
            "${RUNNER_TEMP}/${ASSET}" \
            "${RUNNER_TEMP}/${ASSET}.sha256" \
            --clobber

      - name: Require Homebrew tap token
        if: steps.prepare.outputs.changed != 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            printf 'HOMEBREW_TAP_TOKEN is required to update stephenlclarke/homebrew-tap\n' >&2
            exit 1
          fi

      - name: Checkout Homebrew tap
        if: steps.prepare.outputs.changed != 'true'
        uses: actions/checkout@v7
        with:
          repository: stephenlclarke/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew tap formula
        if: steps.prepare.outputs.changed != 'true'
        env:
          ASSET: ${{ steps.lane.outputs.asset }}
          FORMULA: ${{ steps.lane.outputs.formula }}
          LABEL: ${{ steps.lane.outputs.label }}
          RELEASE_TAG: ${{ steps.lane.outputs.tag }}
          VERSION: ${{ steps.lane.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/stephenlclarke/container-k8s/releases/download/${RELEASE_TAG}/${ASSET}"
          sha256="$(awk '{print $1}' "${RUNNER_TEMP}/${ASSET}.sha256")"
          python3 container-k8s/Tools/release/update-homebrew-formula.py \
            --formula "$FORMULA" \
            --url "$url" \
            --version "$VERSION" \
            --asset "$ASSET" \
            --label "$LABEL" \
            --sha256 "$sha256"
          git -C homebrew-tap diff -- Formula

      - name: Commit Homebrew tap update
        if: steps.prepare.outputs.changed != 'true'
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula; then
            printf 'Homebrew tap formula already points at %s\n' "${{ steps.lane.outputs.asset }}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Formula/${{ steps.lane.outputs.formula }}"
          git commit -m "chore(homebrew): update ${{ github.ref_name }} k8s formula"
          git push
